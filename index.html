<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्मार्ट बधाई ऐप - Direct Share</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            color: white; overflow-x: hidden;
        }

        /* आतिशबाज़ी एनीमेशन */
        .fireworks {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
            background-size: 70px 70px;
            animation: moveUp 4s linear infinite;
            opacity: 0.2;
        }
        @keyframes moveUp { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* कार्ड स्टाइल */
        #badhaiCard {
            width: 100%; max-width: 450px; min-height: 480px;
            border-radius: 20px; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 25px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            background-size: cover; background-position: center;
            border: 6px solid #ffd700; box-sizing: border-box;
            margin-bottom: 20px;
        }

        #cardTitle { font-size: 2.5rem; color: #ffd700; text-shadow: 2px 2px 10px #000; margin-bottom: 10px; }
        #previewPhoto { width: 140px; height: 140px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 15px; display: none; }
        #cardMessage { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 8px #000; line-height: 1.4; }
        .from-tag { font-size: 1.2rem; background: #ffd700; color: #000; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* बटन और विज्ञापन */
        #actionArea { 
            display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 450px; margin-bottom: 30px; 
        }
        .btn { padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-align: center; border: none; color: white; }
        .btn-share { background: #25D366; } /* व्हाट्सएप ग्रीन */
        .btn-dl { background: #3498db; }

        .ad-box { width: 100%; display: flex; justify-content: center; margin: 10px 0; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }

        /* फॉर्म स्टाइल */
        #formArea {
            background: #fff; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-sizing: border-box;
            color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .create-btn { background: #d81b60; color: white; width: 100%; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; }

        .loading-text { display: none; color: #ffd700; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="fireworks"></div>

    <!-- 1. बधाई कार्ड (ऊपर) -->
    <div id="badhaiCard">
        <h2 id="cardTitle">बधाई हो!</h2>
        <img id="previewPhoto" src="" alt="Photo">
        <p id="cardMessage"></p>
        <div class="from-tag">प्रेषक: <span id="senderName"></span></div>
    </div>

    <!-- 2. बटन और विज्ञापन क्षेत्र -->
    <div id="actionArea">
        <div id="loader" class="loading-text">फोटो तैयार हो रही है, कृपया रुकें...</div>
        
        <button class="btn btn-share" onclick="directShare()">सीधे व्हाट्सएप पर फोटो भेजें 📱</button>

        <!-- विज्ञापन कोड -->
        <div class="ad-box">
            <script type="text/javascript">
                atOptions = {
                    'key' : '5ef61b9ce5db99a105f2eab3538cf716',
                    'format' : 'iframe',
                    'height' : 60,
                    'width' : 468,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

        <button class="btn btn-dl" onclick="justDownload()">गैलरी में सेव करें ⬇️</button>
    </div>

    <!-- 3. फॉर्म (नीचे) -->
    <div id="formArea">
        <h2 style="text-align:center; color:#d81b60; margin-top:0;">बधाई कार्ड बनाएँ</h2>
        <label>आपका नाम:</label>
        <input type="text" id="userInput" placeholder="अपना नाम लिखें">
        <label>दोस्त का नाम:</label>
        <input type="text" id="friendInput" placeholder="दोस्त का नाम लिखें">
        <label>दोस्त की फोटो चुनें (Optional):</label>
        <input type="file" accept="image/*" onchange="previewImg(event)">
        <label>अवसर:</label>
        <select id="occSelect">
            <option value="shadi">शादी मुबारक (Special)</option>
            <option value="bday">जन्मदिन (Birthday)</option>
            <option value="anni">सालगिरह (Anniversary)</option>
            <option value="job">नई नौकरी (Job)</option>
        </select>
        <button class="create-btn" onclick="makeCard()">कार्ड तैयार करें</button>
    </div>

    <script>
        const config = {
            'shadi': { img: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600', msg: 'शादी की बहुत-बहुत बधाई! भगवान आपकी जोड़ी सलामत रखे।', title: 'शादी मुबारक' },
            'bday': { img: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?w=600', msg: 'जन्मदिन की हार्दिक शुभकामनाएँ! खुशियाँ आपके कदम चूमे।', title: 'जन्मदिन बधाई' },
            'anni': { img: 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600', msg: 'सालगिरह मुबारक हो! प्यार सदा बना रहे।', title: 'सालगिरह मुबारक' },
            'job': { img: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=600', msg: 'नई नौकरी की बहुत बधाई! खूब तरक्की करें।', title: 'नई नौकरी बधाई' }
        };

        function previewImg(e) {
            const out = document.getElementById('previewPhoto');
            out.src = URL.createObjectURL(e.target.files[0]);
            out.style.display = 'block';
        }

        function makeCard() {
            const s = document.getElementById('userInput').value;
            const f = document.getElementById('friendInput').value;
            const o = document.getElementById('occSelect').value;

            if(!s || !f) { alert("नाम भरें!"); return; }

            const data = config[o];
            document.getElementById('cardTitle').innerText = data.title;
            document.getElementById('cardMessage').innerText = "प्रिय " + f + ", " + data.msg;
            document.getElementById('senderName').innerText = s;
            
            const card = document.getElementById('badhaiCard');
            card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.img}')`;
            card.style.display = "flex";
            document.getElementById('actionArea').style.display = "flex";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // सबसे महत्वपूर्ण: सीधे शेयर करने वाला फंक्शन
        async function directShare() {
            const card = document.getElementById('badhaiCard');
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            try {
                const canvas = await html2canvas(card, { useCORS: true });
                const dataUrl = canvas.toDataURL('image/png');
                const blob = await (await fetch(dataUrl)).blob();
                const file = new File([blob], 'BadhaiCard.png', { type: 'image/png' });

                // क्या ब्राउज़र शेयरिंग सपोर्ट करता है?
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'बधाई संदेश',
                        text: 'आपके लिए एक खास बधाई कार्ड!'
                    });
                } else {
                    alert("आपका ब्राउज़र डायरेक्ट शेयर सपोर्ट नहीं करता। कृपया 'गैलरी में सेव' करें और व्हाट्सएप पर भेजें।");
                }
            } catch (err) {
                console.error('Sharing failed', err);
            }
            loader.style.display = 'none';
        }

        function justDownload() {
            const card = document.getElementById('badhaiCard');
            html2canvas(card, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'MeraBadhaiCard.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            if (p.has('s')) {
                // लिंक से आने पर कार्ड दिखाएं
                const s = p.get('s'), f = p.get('f'), o = p.get('o');
                const data = config[o] || config['shadi'];
                document.getElementById('cardTitle').innerText = data.title;
                document.getElementById('cardMessage').innerText = "प्रिय " + f + ", " + data.msg;
                document.getElementById('senderName').innerText = s;
                const card = document.getElementById('badhaiCard');
                card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.img}')`;
                card.style.display = "flex";
                document.getElementById('actionArea').style.display = "flex";
            }
        };
    </script>
</body>
</html>
