<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल बधाई - फोटो, लिंक और एड्स</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            color: white; overflow-x: hidden;
        }

        /* आतिशबाज़ी एनीमेशन */
        .fireworks-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
            background-size: 75px 75px;
            animation: moveUp 5s linear infinite;
            opacity: 0.2;
        }
        @keyframes moveUp { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* विज्ञापन कंटेनर स्टाइल */
        .ad-slot { width: 100%; max-width: 468px; margin: 15px 0; display: flex; justify-content: center; overflow: hidden; background: rgba(255,255,255,0.05); border-radius: 5px; }

        /* बधाई कार्ड */
        #badhaiCard {
            width: 100%; max-width: 450px; min-height: 500px;
            border-radius: 20px; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 25px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            background-size: cover; background-position: center;
            border: 6px solid #ffd700; box-sizing: border-box;
            margin-bottom: 20px;
        }

        #cardTitle { font-size: 2.5rem; color: #ffd700; text-shadow: 2px 2px 10px #000; margin-bottom: 10px; }
        #previewPhoto { width: 150px; height: 150px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 15px; display: none; box-shadow: 0 0 15px white; }
        #cardMessage { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 8px #000; line-height: 1.4; color: #fff; }
        .from-tag { font-size: 1.2rem; background: #ffd700; color: #000; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* बटन एरिया */
        #actionArea { 
            display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 450px; margin-bottom: 20px; 
        }
        .btn { padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-align: center; border: none; color: white; }
        .btn-wa { background: #25D366; }
        .btn-dl { background: #3498db; }

        /* फॉर्म स्टाइल */
        #formArea {
            background: #fff; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-sizing: border-box;
            color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .create-btn { background: #d81b60; color: white; width: 100%; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }

        .footer { text-align: center; font-size: 14px; color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="fireworks-bg"></div>

    <!-- 1. टॉप बैनर विज्ञापन -->
    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
    </div>

    <!-- 2. बधाई कार्ड (सबसे ऊपर) -->
    <div id="badhaiCard">
        <h2 id="cardTitle">बधाई हो!</h2>
        <img id="previewPhoto" src="" alt="Photo">
        <p id="cardMessage"></p>
        <div class="from-tag">प्रेषक: <span id="senderName"></span></div>
    </div>

    <!-- 3. एक्शन बटन और बीच वाला विज्ञापन -->
    <div id="actionArea">
        <button class="btn btn-wa" onclick="shareToWhatsApp()">वॉट्सऐप पर फोटो + लिंक भेजें 📱</button>

        <!-- बीच वाला बैनर विज्ञापन -->
        <div class="ad-slot">
            <script type="text/javascript">
                atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

        <button class="btn btn-dl" onclick="downloadImageAndPop()">गैलरी में फोटो सेव करें ⬇️</button>
    </div>

    <!-- 4. फॉर्म (नीचे) -->
    <div id="formArea">
        <h2 style="text-align:center; color:#d81b60; margin:0 0 15px 0;">✨ बधाई कार्ड बनाएँ</h2>
        <label>आपका नाम:</label>
        <input type="text" id="userInput" placeholder="अपना नाम लिखें">
        <label>दोस्त का नाम:</label>
        <input type="text" id="friendInput" placeholder="दोस्त का नाम लिखें">
        <label>दोस्त की फोटो चुनें (Optional):</label>
        <input type="file" accept="image/*" onchange="previewImage(event)">
        <label>अवसर चुनें:</label>
        <select id="occSelect">
            <option value="shadi">शादी मुबारक (Fireworks Special)</option>
            <option value="bday">जन्मदिन (Birthday)</option>
            <option value="anni">सालगिरह (Anniversary)</option>
            <option value="job">नई नौकरी (Job)</option>
        </select>
        <button class="create-btn" onclick="buildNew()">अभी कार्ड तैयार करें</button>
    </div>

    <!-- 5. बॉटम बैनर विज्ञापन -->
    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
    </div>

    <div class="footer">डिजिटल बधाई ऐप - 2024</div>

    <!-- पॉपअंडर एड स्क्रिप्ट (Download बटन पर ट्रिगर होगा) -->
    <script src="https://pl28926111.profitablecpmratenetwork.com/12/15/fb/1215fb57c30c4cef7e5d7329a5f9cc53.js"></script>

    <script>
        const cardData = {
            'shadi': { img: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600', msg: 'शादी की बहुत-बहुत बधाई! भगवान आपकी जोड़ी सलामत रखे।', title: 'शादी मुबारक' },
            'bday': { img: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?w=600', msg: 'जन्मदिन की हार्दिक शुभकामनाएँ! आप जियो हजारों साल।', title: 'जन्मदिन बधाई' },
            'anni': { img: 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600', msg: 'सालगिरह मुबारक हो! प्यार सदा बना रहे।', title: 'सालगिरह मुबारक' },
            'job': { img: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=600', msg: 'नई नौकरी पर ढेरों बधाई! खूब उन्नति करें।', title: 'नई नौकरी बधाई' }
        };

        function previewImage(event) {
            const out = document.getElementById('previewPhoto');
            out.src = URL.createObjectURL(event.target.files[0]);
            out.style.display = 'block';
        }

        function buildNew() {
            const s = document.getElementById('userInput').value;
            const f = document.getElementById('friendInput').value;
            const o = document.getElementById('occSelect').value;
            if(!s || !f) { alert("दोनों नाम भरें!"); return; }

            renderCard(s, f, o);
            document.getElementById('actionArea').style.display = "flex";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCard(s, f, o) {
            const data = cardData[o] || cardData['shadi'];
            const card = document.getElementById('badhaiCard');
            document.getElementById('cardTitle').innerText = data.title;
            document.getElementById('cardMessage').innerText = "प्रिय " + f + ", " + data.msg;
            document.getElementById('senderName').innerText = s;
            card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.img}')`;
            card.style.display = "flex";
        }

        // डाउनलोड और पॉपअंडर एड ट्रिगर
        async function downloadImageAndPop() {
            const card = document.getElementById('badhaiCard');
            
            // इमेज डाउनलोड लॉजिक
            html2canvas(card, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Mera_Badhai_Card.png';
                link.href = canvas.toDataURL();
                link.click();
            });

            // पॉपअंडर स्क्रिप्ट पहले से लोड है, पहली क्लिक पर यह अपने आप विज्ञापन खोलेगा।
        }

        async function shareToWhatsApp() {
            const card = document.getElementById('badhaiCard');
            const s = document.getElementById('userInput').value || "शुभचिंतक";
            const f = document.getElementById('friendInput').value || "दोस्त";
            const o = document.getElementById('occSelect').value;

            const canvas = await html2canvas(card, { useCORS: true });
            const dataUrl = canvas.toDataURL('image/png');
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'BadhaiCard.png', { type: 'image/png' });

            const baseUrl = window.location.origin + window.location.pathname;
            const myLink = `${baseUrl}?s=${encodeURIComponent(s)}&f=${encodeURIComponent(f)}&o=${o}`;

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'बधाई संदेश',
                    text: `प्रिय ${f}, आपके लिए सरप्राइज! यहाँ अपना कार्ड बनाएँ: ${myLink}`
                });
            } else {
                alert("Browser not supported. Please Download and share manually.");
            }
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const s = params.get('s'), f = params.get('f'), o = params.get('o');
            if (s && f && o) {
                renderCard(s, f, o);
                document.getElementById('actionArea').style.display = "flex";
            }
        };
    </script>
</body>
</html>
