<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल बधाई ऐप - 2024</title>
    <!-- फोटो डाउनलोड के लिए लाइब्रेरी -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 1. पूरे बैकग्राउंड में आतिशबाज़ी एनीमेशन */
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            color: white; overflow-x: hidden;
        }

        .fireworks-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
            background-size: 80px 80px;
            animation: moveUp 5s linear infinite;
            opacity: 0.3;
        }
        @keyframes moveUp { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* 2. बधाई कार्ड स्टाइल */
        #badhaiCard {
            width: 100%; max-width: 450px; min-height: 480px;
            border-radius: 20px; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 25px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            background-size: cover; background-position: center;
            border: 6px solid #ffd700; box-sizing: border-box;
            margin-bottom: 20px; position: relative;
        }

        #cardTitle { font-size: 2.5rem; color: #ffd700; text-shadow: 2px 2px 10px #000; margin-bottom: 10px; }
        #previewPhoto { width: 150px; height: 150px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 15px; display: none; box-shadow: 0 0 15px white; }
        #cardMessage { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 8px #000; line-height: 1.4; }
        .from-tag { font-size: 1.2rem; background: #ffd700; color: #000; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* 3. बटन ग्रुप और विज्ञापन एरिया */
        #actionButtons { 
            display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 450px; margin-bottom: 30px; 
        }
        .btn { padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-align: center; border: none; color: white; text-decoration: none; display: block; }
        .btn-wa { background: #25D366; }
        .btn-dl { background: #3498db; }

        /* विज्ञापन कंटेनर */
        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 10px 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        /* 4. फॉर्म स्टाइल */
        #formArea {
            background: #fff; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-sizing: border-box;
            color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        #formArea h1 { font-size: 1.5rem; color: #d81b60; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #444; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .create-btn { background: #d81b60; color: white; width: 100%; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }

        .footer { text-align: center; font-size: 14px; color: #777; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="fireworks-overlay"></div>

    <!-- 1. बधाई कार्ड (सबसे ऊपर) -->
    <div id="badhaiCard">
        <h2 id="cardTitle">बधाई हो!</h2>
        <img id="previewPhoto" src="" alt="दोस्त की फोटो">
        <p id="cardMessage"></p>
        <div class="from-tag">प्रेषक: <span id="senderName"></span></div>
    </div>

    <!-- 2. बटन और विज्ञापन (कार्ड और फॉर्म के बीच) -->
    <div id="actionButtons">
        <button class="btn btn-wa" onclick="shareToWhatsApp()">वॉट्सऐप पर लिंक शेयर करें 📱</button>

        <!-- विज्ञापन (Banner Ad) यहाँ शुरू होता है -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {
                    'key' : '5ef61b9ce5db99a105f2eab3538cf716',
                    'format' : 'iframe',
                    'height' : 60,
                    'width' : 468,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>
        <!-- विज्ञापन खत्म -->

        <button class="btn btn-dl" onclick="downloadImage()">गैलरी में फोटो सेव करें ⬇️</button>
    </div>

    <!-- 3. फॉर्म (नीचे) -->
    <div id="formArea">
        <h1>✨ नया बधाई कार्ड बनाएँ</h1>
        <label>आपका नाम:</label>
        <input type="text" id="userInput" placeholder="अपना नाम लिखें">
        
        <label>दोस्त का नाम:</label>
        <input type="text" id="friendInput" placeholder="दोस्त का नाम लिखें">

        <label>दोस्त की फोटो (सिर्फ डाउनलोड के लिए):</label>
        <input type="file" id="imageInput" accept="image/*" onchange="loadFile(event)">
        
        <label>अवसर चुनें:</label>
        <select id="occasionSelect">
            <option value="shadi">शादी मुबारक (आतिशबाज़ी Special)</option>
            <option value="bday">जन्मदिन (Birthday)</option>
            <option value="anni">सालगिरह (Anniversary)</option>
            <option value="job">नई नौकरी (Job)</option>
            <option value="success">सफलता (Success)</option>
        </select>
        
        <button class="create-btn" onclick="buildNew()">अभी कार्ड बनाएँ</button>
    </div>

    <div class="footer">डिजिटल बधाई ऐप - 2024</div>

    <script>
        const cardData = {
            'shadi': { img: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600', msg: 'शादी की बहुत-बहुत बधाई! आप दोनों सदा खुश रहें।', title: 'शादी मुबारक' },
            'bday': { img: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?w=600', msg: 'जन्मदिन की हार्दिक शुभकामनाएँ! भगवान आपकी झोली खुशियों से भर दे।', title: 'जन्मदिन बधाई' },
            'anni': { img: 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600', msg: 'सालगिरह मुबारक हो! प्यार सदा बना रहे।', title: 'सालगिरह मुबारक' },
            'job': { img: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=600', msg: 'नई नौकरी पर ढेरों बधाई! खूब उन्नति करें।', title: 'नई नौकरी बधाई' },
            'success': { img: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=600', msg: 'आपकी इस बड़ी सफलता पर हमें गर्व है। बधाई!', title: 'शानदार जीत' }
        };

        function loadFile(event) {
            const output = document.getElementById('previewPhoto');
            output.src = URL.createObjectURL(event.target.files[0]);
            output.style.display = 'block';
        };

        function buildNew() {
            const sender = document.getElementById('userInput').value;
            const friend = document.getElementById('friendInput').value;
            const occ = document.getElementById('occasionSelect').value;

            if(!sender || !friend) {
                alert("कृपया दोनों नाम भरें!");
                return;
            }

            renderView(sender, friend, occ);
            document.getElementById('actionButtons').style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderView(sender, friend, occ) {
            const data = cardData[occ] || cardData['shadi'];
            const card = document.getElementById('badhaiCard');

            document.getElementById('cardTitle').innerText = data.title;
            document.getElementById('cardMessage').innerText = "प्रिय " + friend + ", " + data.msg;
            document.getElementById('senderName').innerText = sender;
            
            card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.img}')`;
            card.style.display = "flex";
        }

        function downloadImage() {
            const card = document.getElementById('badhaiCard');
            html2canvas(card, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'MeraBadhaiCard.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function shareToWhatsApp() {
            const sender = document.getElementById('userInput').value;
            const friend = document.getElementById('friendInput').value;
            const occ = document.getElementById('occasionSelect').value;
            const baseUrl = window.location.origin + window.location.pathname;
            
            const myLink = `${baseUrl}?s=${encodeURIComponent(sender)}&f=${encodeURIComponent(friend)}&o=${occ}`;
            const text = `*बधाई संदेश!* 🎉%0A%0Aप्रिय *${friend}*, आपके लिए एक खास सरप्राइज है। यहाँ क्लिक करके देखें:%0A${myLink}`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const s = params.get('s');
            const f = params.get('f');
            const o = params.get('o');

            if (s && f && o) {
                renderView(s, f, o);
                document.getElementById('actionButtons').style.display = 'flex';
                window.scrollTo(0, 0);
            }
        });
    </script>
</body>
</html>
