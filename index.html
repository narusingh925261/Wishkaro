<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल बधाई कार्ड - 2024</title>
    <!-- फोटो डाउनलोड के लिए लाइब्रेरी -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 1. पूरी वेबसाइट पर आतिशबाज़ी */
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            color: white; overflow-x: hidden;
        }

        .firework-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 60px 60px;
            animation: fireworksMove 4s linear infinite;
            opacity: 0.2;
        }
        @keyframes fireworksMove { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        /* 2. बधाई कार्ड स्टाइल (सबसे ऊपर) */
        #badhaiCard {
            width: 100%; max-width: 450px; min-height: 480px;
            border-radius: 20px; display: none; /* डिफ़ॉल्ट रूप से छिपा हुआ */
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 25px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.7);
            background-size: cover; background-position: center;
            border: 6px solid #ffd700; box-sizing: border-box;
            margin-bottom: 25px; position: relative;
        }

        #cardTitle { font-size: 2.5rem; color: #ffd700; text-shadow: 3px 3px 10px #000; margin: 5px; }
        #previewPhoto { width: 150px; height: 150px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin: 15px 0; display: none; box-shadow: 0 0 15px white; }
        #cardMessage { font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 8px #000; line-height: 1.4; color: #fff; }
        .from-tag { font-size: 1.2rem; background: #ffd700; color: #000; padding: 8px 25px; border-radius: 30px; font-weight: bold; margin-top: 20px; }

        /* 3. शेयर और डाउनलोड बटन */
        #actionButtons { 
            display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 400px; margin-bottom: 30px; 
        }
        .btn { 
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; 
            cursor: pointer; text-align: center; border: none; color: white; text-decoration: none;
        }
        .btn-wa { background: #25D366; border-bottom: 4px solid #128C7E; }
        .btn-dl { background: #3498db; border-bottom: 4px solid #2980b9; }

        /* 4. फॉर्म स्टाइल (नीचे) */
        #formArea {
            background: #fff; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-sizing: border-box;
            color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }
        #formArea h1 { font-size: 1.6rem; color: #d81b60; text-align: center; margin: 0 0 20px 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .create-btn { background: #d81b60; color: white; width: 100%; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }

        .footer { text-align: center; font-size: 14px; color: #777; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="firework-bg"></div>

    <!-- 1. बधाई कार्ड (सबसे ऊपर) -->
    <div id="badhaiCard">
        <h2 id="cardTitle">बधाई हो!</h2>
        <img id="previewPhoto" src="" alt="Photo">
        <p id="cardMessage"></p>
        <div class="from-tag">प्रेषक: <span id="senderName"></span></div>
    </div>

    <!-- 2. शेयर और डाउनलोड बटन -->
    <div id="actionButtons">
        <button class="btn btn-wa" onclick="shareToWhatsApp()">वॉट्सऐप पर लिंक भेजें 📱</button>
        <button class="btn btn-dl" onclick="downloadAsImage()">फोटो डाउनलोड करें ⬇️</button>
    </div>

    <!-- 3. फॉर्म (नीचे) -->
    <div id="formArea">
        <h1>✨ अपना बधाई कार्ड बनाएँ</h1>
        <label>आपका नाम (प्रेषक):</label>
        <input type="text" id="userInput" placeholder="अपना नाम लिखें">
        
        <label>दोस्त का नाम (पाने वाला):</label>
        <input type="text" id="friendInput" placeholder="दोस्त का नाम लिखें">

        <label>दोस्त की फोटो चुनें (Optional):</label>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        
        <label>अवसर चुनें:</label>
        <select id="occasionSelect">
            <option value="shadi">शादी मुबारक (Fireworks Special)</option>
            <option value="bday">जन्मदिन (Birthday)</option>
            <option value="anni">सालगिरह (Anniversary)</option>
            <option value="job">नई नौकरी (Job)</option>
            <option value="success">सफलता (Success)</option>
        </select>
        
        <button class="create-btn" onclick="createNewCard()">कार्ड तैयार करें</button>
    </div>

    <div class="footer">डिजिटल बधाई ऐप - 2024</div>

    <script>
        const contentData = {
            'shadi': { img: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600', msg: 'शादी की बहुत-बहुत बधाई! भगवान आपकी जोड़ी सलामत रखे।', title: 'शादी मुबारक' },
            'bday': { img: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?w=600', msg: 'जन्मदिन की हार्दिक शुभकामनाएँ! आप जियो हजारों साल।', title: 'जन्मदिन बधाई' },
            'anni': { img: 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600', msg: 'सालगिरह मुबारक हो! आप दोनों हमेशा खुश रहें।', title: 'सालगिरह मुबारक' },
            'job': { img: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=600', msg: 'नई नौकरी की बहुत बधाई! आप खूब तरक्की करें।', title: 'नई नौकरी बधाई' },
            'success': { img: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=600', msg: 'आपकी शानदार सफलता पर हमें गर्व है! बहुत बधाई।', title: 'बधाई हो' }
        };

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('previewPhoto');
                img.src = reader.result;
                img.style.display = "block";
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function createNewCard() {
            const from = document.getElementById('userInput').value;
            const to = document.getElementById('friendInput').value;
            const occ = document.getElementById('occasionSelect').value;

            if(!from || !to) { alert("नाम भरें!"); return; }

            renderCard(from, to, occ);
            document.getElementById('actionButtons').style.display = "flex";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCard(from, to, occ) {
            const card = document.getElementById('badhaiCard');
            const data = contentData[occ] || contentData['shadi'];

            document.getElementById('cardTitle').innerText = data.title;
            document.getElementById('cardMessage').innerText = "प्रिय " + to + ", " + data.msg;
            document.getElementById('senderName').innerText = from;
            
            card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.img}')`;
            card.style.display = "flex";
        }

        function downloadAsImage() {
            const card = document.getElementById('badhaiCard');
            html2canvas(card, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Badhai_Card.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function shareToWhatsApp() {
            const from = document.getElementById('userInput').value;
            const to = document.getElementById('friendInput').value;
            const occ = document.getElementById('occasionSelect').value;

            // Vercel के लिए फिक्स्ड URL लॉजिक
            const baseUrl = window.location.href.split('?')[0];
            const finalLink = `${baseUrl}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&occ=${occ}`;

            const text = `*बधाई संदेश!* 🎉%0A%0Aप्रिय *${to}*, आपके लिए एक सरप्राइज कार्ड है। यहाँ क्लिक करें:%0A${finalLink}`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        // लिंक से आने वाले यूजर के लिए मुख्य फिक्स
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const from = params.get('from');
            const to = params.get('to');
            const occ = params.get('occ');

            if (from && to && occ) {
                // कार्ड दिखाएँ
                renderCard(from, to, occ);
                // डाउनलोड/शेयर बटन दिखाएँ
                document.getElementById('actionButtons').style.display = "flex";
                // स्क्रीन को सबसे ऊपर ले जाएँ ताकि कार्ड दिखे
                window.scrollTo(0, 0);
            }
        };
    </script>
</body>
</html>
